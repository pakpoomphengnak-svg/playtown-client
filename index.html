<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PLAYTOWN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="assets/playtown/icon-192.png">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/hud.css">
  <link rel="stylesheet" href="css/vehicle-controls.css">
  <link rel="stylesheet" href="css/login.css">

  <!-- ── ป้องกัน text selection / callout ทั้งเกม ── -->
  <style>
    * {
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }
    input, textarea, [contenteditable] {
      -webkit-user-select: text;
      user-select: text;
    }
  </style>
  <script>
    document.addEventListener('selectstart', function(e) {
      if (e.target.closest('input, textarea, [contenteditable]')) return;
      e.preventDefault();
    });
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
  </script>
</head>
<body>

  <!-- ── หน้า Login (แสดงก่อนเข้าเกม) ── -->
  <div id="login-screen">
    <div id="login-box">
      <h1>PLAYTOWN</h1>

      <div id="auth-tabs">
        <button id="tab-login" class="auth-tab active">เข้าสู่ระบบ</button>
        <button id="tab-register" class="auth-tab">สมัครสมาชิก</button>
      </div>

      <!-- ── ฟอร์มเข้าสู่ระบบ ── -->
      <form id="login-form" class="auth-form">
        <p class="subtitle">เข้าสู่ระบบเพื่อเล่นต่อ</p>
        <input id="login-username" type="text" placeholder="ชื่อผู้ใช้" autocomplete="off" autocapitalize="off">
        <input id="login-password" type="password" placeholder="รหัสผ่าน" autocomplete="off">
        <button type="submit" id="login-btn">เข้าสู่ระบบ</button>
      </form>

      <!-- ── ฟอร์มสมัครสมาชิก ── -->
      <form id="register-form" class="auth-form hidden">
        <p class="subtitle">สร้างบัญชีใหม่เพื่อเริ่มเล่น</p>
        <input id="register-username" type="text" placeholder="ชื่อผู้ใช้ (3-16 ตัวอักษร)" autocomplete="off" autocapitalize="off">
        <input id="register-password" type="password" placeholder="รหัสผ่าน (อย่างน้อย 4 ตัวอักษร)" autocomplete="off">
        <input id="register-password2" type="password" placeholder="ยืนยันรหัสผ่าน" autocomplete="off">
        <button type="submit" id="register-btn">สมัครสมาชิก</button>
      </form>

      <div id="login-error"></div>
      <div id="login-loading">กำลังโหลด...</div>
    </div>
  </div>

  <!-- ── หน้าสร้างตัวละคร (แสดงครั้งแรกที่ยังไม่มีข้อมูล) ── -->
  <div id="character-screen" style="display:none;">
    <div id="character-box">
      <h1>สร้างตัวละคร</h1>
      <p class="subtitle">กรอกข้อมูลตัวละครของคุณ</p>

      <form id="character-form">
        <input id="char-firstname" type="text" placeholder="ชื่อ" autocomplete="off">
        <input id="char-lastname" type="text" placeholder="นามสกุล" autocomplete="off">

        <label class="field-label">วัน/เดือน/ปีเกิด</label>
        <div id="birthdate-row">
          <input id="char-day" type="number" placeholder="วัน" min="1" max="31" inputmode="numeric">
          <input id="char-month" type="number" placeholder="เดือน" min="1" max="12" inputmode="numeric">
          <input id="char-year" type="number" placeholder="ปี (ค.ศ.)" min="1900" max="2025" inputmode="numeric">
        </div>

        <label class="field-label">เพศ</label>
        <div id="gender-row">
          <button type="button" class="gender-btn" data-gender="male">ชาย</button>
          <button type="button" class="gender-btn" data-gender="female">หญิง</button>
          <button type="button" class="gender-btn" data-gender="lgbtq">LGBTQ</button>
        </div>

        <button type="submit" id="character-submit-btn">เริ่มเล่น</button>
      </form>

      <div id="character-error"></div>
      <div id="character-loading">กำลังบันทึก...</div>
    </div>
  </div>
  <div id="game-ui" style="display:none;">
  <div id="hud">
    <div id="coords">x: 0 &nbsp; z: 0</div>
  </div>

  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-knob"></div>
    </div>
  </div>

  <div id="cam-zone"></div>

  <div id="sprint-btn"><img src="assets/buttons/sprint-btn.png" alt="sprint"></div>
  <div id="attack-btn"><img src="assets/buttons/attack-btn.png" alt="attack"></div>
  </div>

  <script src="js/error-log.js"></script>

  <!-- ── Firebase (ต้องโหลดก่อนระบบ login/data) ── -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/auth/firebaseConfig.js"></script>

  <!-- ── Socket.IO (ต้องโหลดก่อน script เกมทุกตัว) ── -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- ── ระบบ Login (โหลดก่อนเกม ต้อง login สำเร็จก่อนเกมจะเริ่มโหลด) ── -->
  <script src="js/dataService.js"></script>
  <script src="js/auth/authService.js"></script>
  <script src="js/auth/loginUI.js"></script>
  <script src="js/auth/characterUI.js"></script>

  <script>
    function startGameScripts() {
      document.getElementById('game-ui').style.display = 'block';
      var v = Date.now();

      function load(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = src + '?v=' + v;
          s.onload = resolve;
          s.onerror = reject;
          document.body.appendChild(s);
        });
      }

      function loadGroup(srcs) {
        return Promise.all(srcs.map(load));
      }

      // ── GROUP 1: รากฐาน (scene, camera, renderer) ──────────────────────
      loadGroup([
        'js/core/scene.js',
      ])
      // ── GROUP 2: ต้องการ scene ──────────────────────────────────────────
      .then(function () { return loadGroup([
        'js/core/lighting.js',
        'js/world/ground.js',         // ← ประกาศ colliders, groundMeshes
      ]); })
      // ── GROUP 3: ต้องการ scene + colliders + groundMeshes ───────────────
      // (landmark ประกาศ PARK_CENTER, store ประกาศ STORE_CENTER)
      .then(function () { return loadGroup([
        'js/world/trees.js',
        'js/world/roads.js',
        'js/building/landmark.js',    // ← ประกาศ PARK_CENTER, PARK_SIZE
        'js/building/appleFarm.js',
        'js/building/grapeFarm.js',
        'js/building/economy.js',
        'js/building/store.js',       // ← ประกาศ STORE_CENTER
        'js/building/rebel.js',
        'js/building/gas_station.js',
      ]); })
      // ── GROUP 4: ต้องการ PARK_CENTER (parking) และ STORE_CENTER (atm) ──
      .then(function () { return loadGroup([
        'js/building/parking.js',     // ← ใช้ PARK_CENTER จาก landmark.js
        'js/building/atm.js',         // ← ใช้ STORE_CENTER จาก store.js
        'js/building/showroom.js',    // ← ประกาศ SHOWROOM_CENTER
        'js/multiplayer/socketClient.js',
        'js/system/player.js',
        'js/system/notification.js',
      ]); })
      // ── GROUP 5: ต้องการ player, notification, scene ────────────────────
      .then(function () { return loadGroup([
        'js/system/inventory.js',
        'js/system/hotbar.js',
        'js/system/hud.js',
        'js/item/apple.js',
        'js/item/apple_packaged.js',
        'js/item/grape.js',
        'js/item/juice_grape.js',
        'js/item/cash.js',
        'js/item/water_bottle.js',
        'js/item/burger.js',
        'js/item/car_key.js',
        'js/item/safe_key.js',
        'js/item/coffee.js',
        'js/item/spray.js',
        'js/character/characterModel.js', // ← ประกาศ createCharacterModel
        'js/camera/orbitCamera.js',
        'js/input/joystick.js',
        'js/input/cameraDrag.js',
        'js/input/keyboard.js',
        'js/input/sprintButton.js',
        'js/input/attackButton.js',
        'js/vehicle/starter_car.js',  // ← ประกาศ VEHICLE_TYPES (starter)
        'js/vehicle/audi.js',         // ← ประกาศ VEHICLE_TYPES (audi)
      ]); })
      // ── GROUP 6: ต้องการ characterModel, vehicle models ────────────────
      .then(function () { return loadGroup([
        'js/character/characterAnim.js',
        'js/multiplayer/remotePlayers.js', // ← ใช้ createCharacterModel
        'js/system/minimap.js',
        'js/system/vehicle.js',        // ← ใช้ VEHICLE_TYPES, scene, colliders
        'js/pickup/applePickup.js',
        'js/pickup/grapePickup.js',
        'js/progress/appleProgress.js',
        'js/progress/grapeProgress.js',
        'js/system/marketShop.js',
        'js/system/storeShop.js',
        'js/system/safeBox.js',
        'js/system/bank.js',
        'js/system/craftTable.js',
        'js/system/dealership.js',
        'js/system/garage.js',
        'js/system/gas.js',
        'js/system/setting.js',
      ]); })
      // ── GROUP 7: จุดเริ่มเกม (ต้องโหลดสุดท้ายเสมอ) ─────────────────────
      .then(function () { return load('js/game.js'); })
      .catch(function (err) {
        console.error('[startGameScripts] โหลด script ล้มเหลว:', err);
      });
    }

    // ── เรียกหลัง login สำเร็จ ──
    window.onLoginSuccess = function (username) {
      console.log('[Game] login สำเร็จ:', username);
      startGameScripts();
    };
  </script>

  <!-- ล้าง Service Worker เก่าออกอัตโนมัติ -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.unregister(); });
        if (regs.length > 0) location.reload();
      });
    }
  </script>
</body>
</html>
